<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #a2d5f2; /* Light blue background */
      color: #333;
    }
    .card {
      background-color: rgba(255, 255, 255, 0.9); /* Slightly lighter card background */
      border: none;
      backdrop-filter: blur(10px);
      border-radius: 15px;
    }
    .weather-icon {
      font-size: 3rem;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h2 class="text-center mb-4">🌤️ Weather Forecast</h2>

  <!-- City Input -->
  <div class="input-group mb-4">
    <input type="text" id="cityInput" class="form-control" placeholder="Enter city name">
    <button onclick="getWeather()" class="btn btn-primary">Search</button>
  </div>

  <!-- Weather Card -->
  <div id="weatherCard" class="card p-4 mb-4 d-none">
    <h4 id="cityName"></h4>
    <p><span id="temp" class="fs-3 fw-bold"></span>°C - <span id="desc"></span></p>
    <p>Humidity: <span id="humidity"></span>%</p>
    <p>Wind Speed: <span id="wind"></span> m/s</p>
  </div>

  <!-- Chart -->
  <div class="card p-4">
    <canvas id="tempChart" height="100"></canvas>
  </div>
</div>

<script>
  let chart;

  function getWeather() {
    const city = document.getElementById('cityInput').value;
    fetch(`/api/weather/?city=${city}`)
      .then(response => response.json())
      .then(data => {
        if (data.error) {
          alert(data.error);
          return;
        }

        // Display weather card
        document.getElementById('weatherCard').classList.remove('d-none');
        document.getElementById('cityName').textContent = data.city;
        document.getElementById('temp').textContent = data.temperature;
        document.getElementById('desc').textContent = data.description;
        document.getElementById('humidity').textContent = data.humidity;
        document.getElementById('wind').textContent = data.wind_speed;

        // Render or update chart
        if (chart) {
          chart.destroy();
        }

        chart = new Chart(document.getElementById('tempChart'), {
          type: 'line',
          data: {
            labels: ['Today', 'Tomorrow', 'Day 3', 'Day 4', 'Day 5'],
            datasets: [{
              label: 'Temperature (°C)',
              data: [data.temperature, data.temperature + 1, data.temperature + 2, data.temperature - 1, data.temperature], // Dummy forecast
              backgroundColor: 'rgba(255, 255, 255, 0.1)',
              borderColor: '#0dcaf0',
              borderWidth: 2,
              fill: true,
              tension: 0.4
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: {
                ticks: {
                  color: '#333'
                }
              },
              x: {
                ticks: {
                  color: '#333'
                }
              }
            },
            plugins: {
              legend: {
                labels: {
                  color: '#333'
                }
              }
            }
          }
        });
      })
      .catch(err => {
        alert("Error fetching weather data");
        console.error(err);
      });
  }
</script>

</body>
</html>
